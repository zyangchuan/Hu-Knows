# Production overrides for docker-compose.yml. Like the dev file, this is NOT
# merged automatically — pass it explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# Pins the production image targets and loads secrets from .env.prod.
services:
  frontend:
    build:
      target: runner
    env_file:
      - ./.env.prod

  user-service:
    build:
      target: runner
    env_file:
      - ./.env.prod

  game-service:
    build:
      target: runner
    env_file:
      # Host (iPad) WebSocket auth: SUPABASE_JWT_SECRET / SUPABASE_JWT_AUDIENCE /
      # AUTH_COOKIE_NAME (shared with user-service).
      - ./.env.prod

  game-service-demo:
    build:
      target: runner
    # No env_file — demo runs in-memory with host auth off.

  via-log-service:
    build:
      target: runner
    env_file:
      - ./.env.prod
