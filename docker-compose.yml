# Base stack (production-oriented defaults).
#
# For local development, layer docker-compose.dev.yml on top (dev build targets,
# source bind-mounts, watch mode):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Run this base config alone for a prod-like build:
#   docker compose up --build
services:
  frontend:
    container_name: frontend
    build:
      context: ./frontend
    # Next.js standalone server (output: "standalone").
    command: node server.js
    expose:
      - "3000"
    restart: unless-stopped

  user-service:
    container_name: user-service
    build:
      context: ./services/user-service
    expose:
      - "8000"
      - "50051"
    restart: unless-stopped

  game-redis:
    container_name: game-redis
    image: redis:7-alpine
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - game-redis-data:/data
    restart: unless-stopped

  game-service:
    container_name: game-service
    build:
      context: ./services/game-service
    expose:
      - "8000"
    depends_on:
      - game-redis
    restart: unless-stopped

  # DEMO game-service — a fully independent copy: in-memory (no Redis), no auth on
  # the WebSockets, served on its own path /api/game-service-demo. Used only by
  # the /demo flow.
  game-service-demo:
    container_name: game-service-demo
    build:
      context: ./services/game-service-demo
    expose:
      - "8000"
    restart: unless-stopped

  # GUIDED-LEARN game-service — another independent in-memory copy. Adds a host
  # how-to-play gate before the game and a preset near-win deal so a round ends in
  # ~3 turns. Served on /api/game-service-demo-learn; used only by the /demo-learn
  # flow.
  game-service-demo-learn:
    container_name: game-service-demo-learn
    build:
      context: ./services/game-service-demo-learn
    expose:
      - "8000"
    restart: unless-stopped

  via-log-service:
    container_name: via-log-service
    build:
      context: ./services/via-log-service
    expose:
      - "8000"
      - "50051"
    restart: unless-stopped

  docs:
    container_name: api-docs
    build:
      context: ./docs
    expose:
      - "80"
    restart: unless-stopped

  reverse-proxy:
    container_name: reverse-proxy
    build:
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - user-service
      - game-service
      - game-service-demo
      - game-service-demo-learn
      - via-log-service
      - docs
    restart: unless-stopped

volumes:
  game-redis-data:
