events {}

http {
    # Upstream Next.js frontend (Docker Compose service name + port).
    upstream frontend {
        server frontend:3000;
    }

    # Upstream NestJS user-service.
    upstream user_service {
        server user-service:8000;
    }

    # Upstream NestJS game-service (WebSocket).
    upstream game_service {
        server game-service:8000;
    }

    # Upstream DEMO game-service (WebSocket, in-memory, no auth).
    upstream game_service_demo {
        server game-service-demo:8000;
    }

    # Upstream NestJS via-log-service.
    upstream via_log_service {
        server via-log-service:8000;
    }

    # Upstream aggregated OpenAPI docs (Swagger UI for all services).
    upstream docs {
        server docs:80;
    }

    server {
        listen 80;
        server_name _;

        # Route the user-service API to the NestJS container.
        location /api/user-service/ {
            proxy_pass http://user_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # game-service: HTTP + WebSocket (Socket.IO upgrade).
        location /api/game-service {
            proxy_pass http://game_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # DEMO game-service: HTTP + WebSocket. Longer prefix than /api/game-service
        # so demo traffic routes here; production /api/game-service is unaffected.
        location /api/game-service-demo {
            proxy_pass http://game_service_demo;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # via-log-service API.
        location /api/via-log-service {
            proxy_pass http://via_log_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Aggregated OpenAPI docs / Swagger UI for all services.
        location /docs {
            proxy_pass http://docs;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route all other requests to the frontend service.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Support Next.js HMR / websockets in the dev environment.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 86400;
        }
    }
}
