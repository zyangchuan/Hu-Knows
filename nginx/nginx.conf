events {}

http {
    # Upstream Next.js frontend (Docker Compose service name + port).
    upstream frontend {
        server frontend:3000;
    }

    # Upstream NestJS user-service.
    upstream user_service {
        server user-service:8000;
    }

    server {
        listen 80;
        server_name _;

        # Route the user-service API to the NestJS container.
        location /api/user-service/ {
            proxy_pass http://user_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenAPI docs / Swagger UI (this prefix also covers /docs-json).
        location /docs {
            proxy_pass http://user_service;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route all other requests to the frontend service.
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Support Next.js HMR / websockets in the dev environment.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 86400;
        }
    }
}
