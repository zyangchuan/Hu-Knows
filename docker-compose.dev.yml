# Development overrides for docker-compose.yml. Unlike a *.override.yml file,
# this is NOT merged automatically — pass it explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Builds the `dev` image targets and bind-mounts source for hot reloading.
# The frontend dev server stays internal; use nginx on port 80.
services:
  frontend:
    build:
      target: dev
    env_file:
      - ./.env.dev
    command: npm run dev
    volumes:
      # Bind-mount source for hot reloading...
      - ./frontend:/app
      # ...but keep container-owned node_modules and .next (anonymous volumes
      # shadow the host mounts so they aren't clobbered by the bind mount).
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      # Enable file-watching polling for reliable HMR inside containers.
      - WATCHPACK_POLLING=true

  user-service:
    build:
      target: dev
    env_file:
      - ./.env.dev
    volumes:
      # Bind-mount source for watch-mode reloads; keep container node_modules.
      - ./services/user-service/src:/app/src
      - ./services/user-service/proto:/app/proto
      - /app/node_modules

  game-redis:
    # Publish for local redis-cli inspection during development.
    ports:
      - "6379:6379"

  game-service:
    build:
      target: dev
    env_file:
      # Supplies SUPABASE_URL / SUPABASE_JWT_AUDIENCE / AUTH_COOKIE_NAME used to
      # auth the host+player WebSockets, plus REDIS_URL.
      - ./.env.dev
    volumes:
      - ./services/game-service/src:/app/src
      - ./services/game-service/proto:/app/proto
      - /app/node_modules

  game-service-demo:
    build:
      target: dev
    # No env_file: the demo needs no Supabase/Redis/DB (in-memory, auth off).
    volumes:
      - ./services/game-service-demo/src:/app/src
      - /app/node_modules

  game-service-demo-learn:
    build:
      target: dev
    # No env_file: in-memory, auth off (same as the demo service).
    volumes:
      - ./services/game-service-demo-learn/src:/app/src
      - /app/node_modules

  via-log-service:
    build:
      target: dev
    env_file:
      # DATABASE_URL/SSL, SUPABASE_URL, SUPABASE_JWT_AUDIENCE, AUTH_COOKIE_NAME.
      # (The user-service gRPC address is fixed to user-service:50051 in config.)
      - ./.env.dev
    volumes:
      - ./services/via-log-service/src:/app/src
      - ./services/via-log-service/proto:/app/proto
      - /app/node_modules
